<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>TU MARCA</h2>
</header>

<div id="contenedor">

  <!-- MENU -->
  <div id="menu">
    <button onclick="cambiarAmbiente('sala')">Sala</button>
    <button onclick="cambiarAmbiente('bano')">Baño</button>
    <button onclick="cambiarAmbiente('recamara')">Recámara</button>
    <button onclick="cambiarAmbiente('terraza')">Terraza</button>
    <button onclick="cambiarAmbiente('fachada')">Fachada</button>
  </div>

  <!-- VISOR -->
  <div id="visor">
    <div id="escena">
      <img id="ambiente" src="img/habitaciones/sala.jpg">

      <div id="muro"></div>
      <div id="piso"></div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <img id="preview">
    <h3 id="nombre">Selecciona un modelo</h3>

    <button onclick="aplicarPiso()">Aplicar a piso</button>
    <button onclick="aplicarMuro()">Aplicar a muro</button>
  </div>

</div>

<!-- CATALOGO -->
<div id="catalogo"></div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
